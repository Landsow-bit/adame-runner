<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Pour la ville 💚</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
overflow:hidden;
color:white;
}

#menu{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(#1d1d1d,#050505);
}

h1{
font-size:60px;
color:#3cff70;
text-shadow:0 0 20px #3cff70;
margin-bottom:15px;
}

p{
opacity:.8;
margin-bottom:40px;
}

button{
width:250px;
padding:18px;
margin:10px;
font-size:22px;
border:none;
border-radius:15px;
background:#3cff70;
color:black;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

#game{
display:none;
width:100vw;
height:100vh;
background:#222;
position:relative;
}

</style>
</head>

<body>

<div id="menu">

<h1>POUR LA VILLE 💚</h1>

<p>Choisis ton personnage</p>

<button onclick="start('adame')">
🇲🇦 Adame
</button>

<button onclick="start('ylian')">
🇩🇿 Ylian
</button>

<button onclick="start('sebai')">
🍗 Sebai
</button>

</div>

<div id="game"></div>

<script>

function start(name){

document.getElementById("menu").style.display="none";

document.getElementById("game").style.display="block";

document.getElementById("game").innerHTML=`
<h2 style="text-align:center;padding-top:40px;">
Bienvenue ${name.toUpperCase()}
</h2>
`;

}

</script>

</body>
</html>
